<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malaysia Map - Demo</title>
  <link rel="stylesheet" href="dist/css/style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      margin-top: 0;
      color: #333;
    }
    .info {
      background: #e3f2fd;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      border-left: 4px solid #2196f3;
    }
    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 20px;
      background: #2196f3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #1976d2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗺️ Malaysia Map Library - Interactive Demo</h1>
    
    <div class="info">
      <strong>Instructions:</strong> Click on any state to see its name. Use mouse to pan and scroll to zoom.
    </div>

    <div class="controls">
      <button onclick="addKLMarker()">Add KL Marker</button>
      <button onclick="addPenangMarker()">Add Penang Marker</button>
      <button onclick="resetView()">Reset View</button>
    </div>

    <div id="my-map" style="height: 600px; width: 100%; border: 1px solid #ddd; border-radius: 4px;"></div>
  </div>

  <script type="module">
    import MsiaMap from './dist/MsiaMap.js';

    // Initialize map
    const map = new MsiaMap('my-map', {
      onRegionClick: (feature) => {
        alert(`You clicked: ${feature.properties.name}`);
      }
    });

    // Make map available globally for demo buttons
    window.demoMap = map;

    // Add some initial markers
    window.addKLMarker = () => {
      map.addStateMarker('Kuala Lumpur', 3.139, 101.6869);
    };

    window.addPenangMarker = () => {
      map.addStateMarker('Penang', 5.4164, 100.3327);
    };

    window.resetView = () => {
      map.setView([4.2105, 101.9758], 6);
    };
  </script>
</body>
</html>
